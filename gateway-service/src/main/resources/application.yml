server:
  port: 8080

spring:
  application:
    name: gateway-service
  cloud:
    gateway:
      routes:
        - id: auth-route
          uri: ${AUTH_SERVICE_URL:lb://auth-service}
          predicates:
            - Path=/api/auth/**
        - id: textil-route
          uri: ${TEXTIL_SERVICE_URL:lb://textil-service}
          predicates:
            - Path=/api/telas/**, /api/exchange-rate/**
        - id: frontend-route
          uri: ${TEXTIL_SERVICE_URL:lb://textil-service}
          predicates:
            - Path=/**

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_SERVER_URL:http://localhost:8761/eureka/}
