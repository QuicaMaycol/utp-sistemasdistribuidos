server:
  port: 8080

spring:
  application:
    name: gateway-service
  cloud:
    gateway:
      routes:
        - id: event-route
          uri: lb://event-service
          predicates:
            - Path=/api/events/**
        - id: booking-route
          uri: lb://booking-service
          predicates:
            - Path=/api/bookings/**

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
